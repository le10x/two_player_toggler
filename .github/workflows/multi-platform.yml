name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android 32-bit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # Especificamos Android32 explícitamente
          target: Android32
          sdk: nightly
          # Quitamos 'combine: true' porque solo queremos 32 bits
          
