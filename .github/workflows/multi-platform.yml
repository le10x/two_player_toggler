name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            target: Android32

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          # Al poner la versión aquí, la acción fuerza a CMake a encontrarla
          sdk: v5.5.0
          combine: true
          
