name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    name: Android 32 Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Nombre oficial de la acción de instalación
      - name: Setup Geode
        uses: geode-sdk/setup@v1
        with:
          sdk: v5.5.0

      # Nombre oficial de la acción de compilación
      - name: Build Mod
        uses: geode-sdk/build@v1
        with:
          target: android32
          combine: true
          
