name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        # Esta es la acción que contiene todo el proceso
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android32
          sdk: v5.5.0
          combine: true
          
