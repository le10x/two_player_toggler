name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Usamos nombres simplificados sin puntos (evita matrix.config.target)
        target: [win, android32, android64, mac, ios]

    # Determinamos el sistema operativo basado en el target
    runs-on: ${{ (matrix.target == 'win' && 'windows-latest') || ((matrix.target == 'mac' || matrix.target == 'ios') && 'macos-latest') || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # Referencia directa al valor de la lista
          target: ${{ matrix.target }}
          sdk: nightly
          combine: true
          
