name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android 32
            os: ubuntu-latest
            target: android32

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      # Este paso "instala" Geode en el servidor para que CMake lo vea
      - name: Setup Geode
        uses: geode-sdk/setup-geode@main
        with:
          sdk: v5.5.0

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true
          
