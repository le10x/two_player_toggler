name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: Windows,  os: windows-latest, target: win }
          - { name: Android64, os: ubuntu-latest,  target: android64 }
          - { name: Android32, os: ubuntu-latest,  target: android32 }
          - { name: macOS,    os: macos-latest,   target: mac }
          - { name: iOS,      os: macos-latest,   target: ios }

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          sdk: v5.5.0
          combine: true
          
