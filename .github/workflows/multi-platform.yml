name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            target: Android32

    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          sdk: v5.5.0
          
