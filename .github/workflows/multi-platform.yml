name: Build Geode Mod
on: [workflow_dispatch, push]

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          # Al poner 'Android', la acción instala el SDK automáticamente
          target: Android
          # Forzamos la versión nightly que es la que soporta 2.2081
          sdk: nightly
          combine: true
          
