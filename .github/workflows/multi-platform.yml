name: Build Geode Mod
on: [workflow_dispatch, push]

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Geode SDK
        uses: geode-sdk/setup-geode@main
        with:
          sdk: nightly # Necesario para la versión 2.2081

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: Android32
          combine: true
          
